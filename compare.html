<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Answers</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #fcfcfb;
            --surface: #ffffff;
            --text: #171717;
            --muted: #6b6b6b;
            --line: #e6e6e2;
            --line-strong: #d4d4cf;
            --soft: #f5f5f2;
            --match: #f1f1ee;
        }

        body.dark {
            color-scheme: dark;
            --bg: #111111;
            --surface: #161616;
            --text: #f5f5f3;
            --muted: #afafaa;
            --line: #2b2b2b;
            --line-strong: #3b3b3b;
            --soft: #1a1a1a;
            --match: #202020;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Helvetica Neue", Arial, sans-serif;
            transition: background 0.2s ease, color 0.2s ease;
        }

        a,
        button {
            font: inherit;
        }

        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 28px 24px 88px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 52px;
        }

        .brand {
            font-size: 0.95rem;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        .theme-toggle,
        .back-btn {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            border-radius: 999px;
            padding: 10px 16px;
            cursor: pointer;
            text-decoration: none;
        }

        .page-title {
            font-size: clamp(3rem, 7vw, 4.6rem);
            line-height: 0.98;
            letter-spacing: -0.05em;
            margin-bottom: 20px;
        }

        .summary-text,
        .info,
        .answer-label,
        .empty-state,
        .error,
        .bingo-caption {
            color: var(--muted);
            line-height: 1.7;
        }

        .summary-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-top: 30px;
            margin-bottom: 16px;
            padding: 16px 18px;
            background: var(--soft);
            border: 1px solid var(--line);
            border-radius: 14px;
        }

        .summary-count {
            color: var(--text);
            font-weight: 700;
        }

        .question-container {
            margin-top: 34px;
            padding-top: 14px;
            border-top: 1px solid var(--line);
        }

        .question-title {
            font-size: clamp(1.7rem, 4vw, 2.25rem);
            line-height: 1.18;
            letter-spacing: -0.04em;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr)) auto;
            gap: 18px;
            align-items: end;
        }

        .answer-text {
            font-size: 1.08rem;
            line-height: 1.65;
            color: var(--text);
            margin-top: 6px;
            word-break: break-word;
        }

        .answer-text.muted {
            color: var(--muted);
        }

        .answer-status {
            color: var(--muted);
            padding: 10px 0;
        }

        .answer-status.match {
            color: var(--text);
            background: var(--match);
            border: 1px solid var(--line);
            padding: 10px 14px;
            border-radius: 999px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 32px;
        }

        .bingo-cell {
            min-height: 170px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: var(--surface);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: space-between;
        }

        .bingo-cell.match {
            background: var(--match);
            border-color: var(--line-strong);
        }

        .bingo-name {
            font-size: clamp(1.2rem, 2.6vw, 1.7rem);
            line-height: 1.08;
            letter-spacing: -0.04em;
            font-weight: 700;
        }

        .bingo-answer {
            display: grid;
            gap: 4px;
        }

        .bingo-answer strong {
            color: var(--text);
            font-size: 0.98rem;
        }

        .bingo-answer span {
            color: var(--muted);
            line-height: 1.45;
        }

        .bingo-state {
            align-self: flex-start;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.92rem;
            color: var(--muted);
        }

        .bingo-cell.match .bingo-state {
            color: var(--text);
            background: var(--surface);
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 38px;
            padding-top: 24px;
            border-top: 1px solid var(--line);
        }

        .empty-state,
        .error {
            margin-top: 20px;
            padding: 16px 18px;
            border-radius: 14px;
            background: var(--soft);
            border: 1px solid var(--line);
        }

        .error {
            border-color: #d68d8d;
        }

        .theme-toggle:hover,
        .back-btn:hover {
            opacity: 0.85;
        }

        @media (max-width: 720px) {
            .page {
                padding: 20px 18px 72px;
            }

            .topbar,
            .summary-bar,
            .actions {
                flex-direction: column;
                align-items: flex-start;
            }

            .comparison-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .bingo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">Comparison</div>
            <button id="themeToggle" class="theme-toggle" type="button">Light / Dark</button>
        </div>

        <h1 class="page-title">Compare answers</h1>
        <p class="summary-text">The comparison view now follows the same minimal design system as the questionnaire, including the bingo flow.</p>
        <div id="content"></div>
    </div>

    <script src="questions.js"></script>
    <script src="logic.js"></script>
    <script>
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function getThemePreference() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || savedTheme === 'light') {
                return savedTheme;
            }

            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            document.body.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
        }

        function renderStandardComparison(questionSetParam, questionsSet, previousAnswerArray, myAnswerArray) {
            let matchCount = 0;
            let html = '';

            questionsSet.questions.forEach((q, index) => {
                const previousIndex = previousAnswerArray[index] || 0;
                const myIndex = myAnswerArray[index] || 0;
                const previousSkipped = previousIndex === 0;
                const mySkipped = myIndex === 0;
                const isMatch = previousIndex === myIndex && !previousSkipped && !mySkipped;

                if (isMatch) {
                    matchCount += 1;
                }

                const previousText = previousSkipped ? 'Skipped' : (previousIndex - 1 >= 0 && previousIndex - 1 < q.options.length ? q.options[previousIndex - 1] : '(Invalid)');
                const myText = mySkipped ? 'Skipped' : (myIndex - 1 >= 0 && myIndex - 1 < q.options.length ? q.options[myIndex - 1] : '(Invalid)');

                html += `
                    <section class="question-container">
                        <h2 class="question-title">${index + 1}. ${q.question}</h2>
                        <div class="comparison-grid">
                            <div>
                                <div class="answer-label">Previous answer</div>
                                <div class="answer-text ${previousSkipped ? 'muted' : ''}">${previousText}</div>
                            </div>
                            <div>
                                <div class="answer-label">My answer</div>
                                <div class="answer-text ${mySkipped ? 'muted' : ''}">${myText}</div>
                            </div>
                            <div class="answer-status ${isMatch ? 'match' : ''}">${isMatch ? 'Match' : 'Different'}</div>
                        </div>
                    </section>
                `;
            });

            return `
                <div class="info">Questionnaire: <strong>${questionSetParam}</strong></div>
                <div class="summary-bar">
                    <div>Comparison summary</div>
                    <div class="summary-count">${matchCount} matches of ${questionsSet.questions.length}</div>
                </div>
                ${html || '<div class="empty-state">No questions found for this questionnaire.</div>'}
            `;
        }

        function renderBingoComparison(questionsSet, previousAnswerArray, myAnswerArray) {
            let matchCount = 0;
            let html = '';

            questionsSet.questions.forEach((q, index) => {
                const previousIndex = previousAnswerArray[index] || 0;
                const myIndex = myAnswerArray[index] || 0;
                const previousSkipped = previousIndex === 0;
                const mySkipped = myIndex === 0;
                const isMatch = previousIndex === myIndex;

                if (isMatch) {
                    matchCount += 1;
                }

                const previousText = previousSkipped ? 'Skipped' : (previousIndex - 1 >= 0 && previousIndex - 1 < q.options.length ? q.options[previousIndex - 1] : '(Invalid)');
                const myText = mySkipped ? 'Skipped' : (myIndex - 1 >= 0 && myIndex - 1 < q.options.length ? q.options[myIndex - 1] : '(Invalid)');

                html += `
                    <article class="bingo-cell ${isMatch ? 'match' : ''}">
                        <div class="bingo-name">${q.question}</div>
                        <div class="bingo-answer">
                            <strong>Previous</strong>
                            <span>${previousText}</span>
                        </div>
                        <div class="bingo-answer">
                            <strong>Mine</strong>
                            <span>${myText}</span>
                        </div>
                        <div class="bingo-state">${isMatch ? 'Match' : 'Different'}</div>
                    </article>
                `;
            });

            return `
                <div class="info">${questionsSet.title || 'Bingo comparison'}</div>
                <div class="summary-bar">
                    <div>Bingo summary</div>
                    <div class="summary-count">${matchCount} matches of ${questionsSet.questions.length}</div>
                </div>
                <div class="bingo-caption">Each square shows the previous answer and your answer using the same simple visual style as the main bingo page.</div>
                <div class="bingo-grid">${html}</div>
            `;
        }

        function renderComparison() {
            const contentDiv = document.getElementById('content');
            const questionSetParam = getURLParameter('questionSet');
            const previousAnswerParam = getURLParameter('previousAnswer');
            const myAnswerParam = getURLParameter('myAnswer');

            if (!questionSetParam || !previousAnswerParam || !myAnswerParam) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Missing required parameters. Please provide questionSet, previousAnswer, and myAnswer.
                    </div>
                `;
                return;
            }

            const questionsSet = questionBank[questionSetParam];
            if (!questionsSet) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Question set "${questionSetParam}" not found.
                    </div>
                `;
                return;
            }

            const previousAnswerArray = answerNumberToAnswers(questionsSet, parseInt(previousAnswerParam, 10));
            const myAnswerArray = answerNumberToAnswers(questionsSet, parseInt(myAnswerParam, 10));

            const bodyHtml = questionSetParam === 'bingo'
                ? renderBingoComparison(questionsSet, previousAnswerArray, myAnswerArray)
                : renderStandardComparison(questionSetParam, questionsSet, previousAnswerArray, myAnswerArray);

            const backHref = questionSetParam === 'bingo'
                ? `bingo.html?questions=${questionSetParam}`
                : `index.html?questions=${questionSetParam}`;

            contentDiv.innerHTML = `
                ${bodyHtml}
                <div class="actions">
                    <a href="${backHref}" class="back-btn">Back to questionnaire</a>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', function() {
            applyTheme(getThemePreference());
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            renderComparison();
        });
    </script>
</body>
</html>
