<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Answers</title>
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem("theme");
                const theme = savedTheme === "dark" || savedTheme === "light"
                    ? savedTheme
                    : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
                document.documentElement.classList.toggle("dark", theme === "dark");
            } catch (error) {
                document.documentElement.classList.toggle("dark", window.matchMedia("(prefers-color-scheme: dark)").matches);
            }
        }());
    </script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">Comparison</div>
            <button id="themeToggle" class="theme-toggle" type="button">Light / Dark</button>
        </div>

        <h1 class="page-title">Compare answers</h1>
        <p class="summary-text">This page is now focused only on displaying comparison results, while shared behavior lives in reusable assets.</p>
        <div id="content"></div>
    </div>

    <script src="data/question-bank.js"></script>
    <script src="logic.js"></script>
    <script src="assets/js/shared.js"></script>
    <script src="assets/js/compare-page.js"></script>
</body>
</html>
