<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Questionnaire</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #fcfcfb;
            --surface: #ffffff;
            --text: #171717;
            --muted: #6b6b6b;
            --line: #e6e6e2;
            --line-strong: #d4d4cf;
            --soft: #f5f5f2;
            --overlay: rgba(12, 12, 12, 0.38);
        }

        body.dark {
            color-scheme: dark;
            --bg: #111111;
            --surface: #161616;
            --text: #f5f5f3;
            --muted: #afafaa;
            --line: #2b2b2b;
            --line-strong: #3b3b3b;
            --soft: #1a1a1a;
            --overlay: rgba(0, 0, 0, 0.62);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Helvetica Neue", Arial, sans-serif;
            transition: background 0.2s ease, color 0.2s ease;
        }

        button,
        input {
            font: inherit;
        }

        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 28px 24px 88px;
        }

        .topbar {
            display: grid;
            grid-template-columns: 36px 1fr auto;
            align-items: center;
            gap: 16px;
            margin-bottom: 52px;
        }

        .brand {
            font-size: 0.95rem;
            color: var(--muted);
            letter-spacing: 0.03em;
            text-align: center;
        }

        .theme-toggle,
        .copy-btn {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            border-radius: 999px;
            padding: 10px 16px;
            cursor: pointer;
            text-decoration: none;
        }

        .page-title {
            font-size: clamp(3rem, 7vw, 4.6rem);
            line-height: 0.98;
            letter-spacing: -0.05em;
            margin-bottom: 24px;
        }

        .lead,
        .info {
            font-size: 1.08rem;
            line-height: 1.75;
            color: var(--muted);
            max-width: 780px;
        }

        .lead + .lead {
            margin-top: 18px;
        }

        .info,
        .notice,
        .error {
            margin-bottom: 24px;
        }

        .notice,
        .error {
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: var(--soft);
            color: var(--text);
            line-height: 1.65;
        }

        .error {
            border-color: #d68d8d;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 36px;
        }

        .bingo-cell-btn {
            min-height: 150px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            text-align: left;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .bingo-cell-btn:hover {
            border-color: var(--line-strong);
            transform: translateY(-1px);
        }

        .bingo-cell-btn.clicked {
            background: var(--soft);
            border-color: var(--text);
        }

        .cell-index {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .cell-label {
            font-size: clamp(1.3rem, 3vw, 1.9rem);
            line-height: 1.06;
            letter-spacing: -0.04em;
            font-weight: 700;
        }

        .cell-state {
            color: var(--muted);
            font-size: 0.98rem;
        }

        .bingo-cell-btn.clicked .cell-state {
            color: var(--text);
        }

        .form-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 42px;
            padding-top: 28px;
            border-top: 1px solid var(--line);
        }

        .submit-btn {
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            cursor: pointer;
            background: var(--text);
            color: var(--bg);
            font-weight: 600;
        }

        .action-hint {
            color: var(--muted);
            line-height: 1.6;
        }

        .theme-toggle:hover,
        .copy-btn:hover,
        .submit-btn:hover {
            opacity: 0.85;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            padding: 0;
            margin-bottom: 0;
            border-radius: 999px;
            color: var(--muted);
            text-decoration: none;
            transition: background 0.2s ease, color 0.2s ease;
            flex-shrink: 0;
        }

        .back-link:hover {
            background: var(--soft);
            color: var(--text);
        }

        .back-link svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 1000;
            padding: 24px;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            width: min(720px, 100%);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .modal-header h2 {
            font-size: 1.7rem;
            letter-spacing: -0.03em;
        }

        .close-btn {
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
        }

        .url-container {
            display: grid;
            gap: 12px;
        }

        .url-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: var(--soft);
            color: var(--text);
        }

        .copy-btn.copied {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        @media (max-width: 720px) {
            .page {
                padding: 20px 18px 72px;
            }

            .form-actions,
            .modal-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .topbar {
                grid-template-columns: 36px 1fr auto;
                margin-bottom: 36px;
            }

            .bingo-grid {
                grid-template-columns: 1fr;
            }

            .bingo-cell-btn {
                min-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a href="index.html" class="back-link" aria-label="Back to questionnaires" title="Back to questionnaires">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M15 18L9 12L15 6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </a>
            <div class="brand">Bingo</div>
            <button id="themeToggle" class="theme-toggle" type="button">Light / Dark</button>
        </div>
        <h1 id="bingoTitle" class="page-title">Which food do you like?</h1>
        <p class="lead">Pick every item that fits you. The grid keeps the bingo format, but now it follows the same simple visual system as the main questionnaire.</p>
        <p class="lead">When you finish, generate a shareable link or compare your grid with someone else’s result.</p>
        <div id="content"></div>
    </div>

    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Your answer link</h2>
                <button class="close-btn" type="button" onclick="closeModal()">&times;</button>
            </div>
            <div class="url-container">
                <input type="text" id="resultUrl" class="url-input" readonly>
                <button class="copy-btn" type="button" onclick="copyToClipboard()">Copy link</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="logic.js"></script>
    <script>
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function getThemePreference() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || savedTheme === 'light') {
                return savedTheme;
            }

            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            document.body.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
        }

        function buildAnswerNumber(questionsSet, formElement) {
            const formData = new FormData(formElement);
            const answerArray = [];

            questionsSet.questions.forEach((q, index) => {
                const value = formData.get(`question_${index}`);
                const optionIndex = q.options.findIndex(opt => opt === value);
                answerArray.push(optionIndex >= 0 ? optionIndex + 1 : 0);
            });

            return handleAnswers(questionsSet, answerArray);
        }

        function renderBingo() {
            const contentDiv = document.getElementById('content');
            const questionSetParam = getURLParameter('questions') || 'bingo';
            const questionsSet = questionBank[questionSetParam];

            if (!questionsSet) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Question set "${questionSetParam}" not found. Use ?questions=bingo
                    </div>
                `;
                return;
            }

            document.getElementById('bingoTitle').textContent = questionsSet.title || 'Which food do you like?';

            const previousAnswer = getURLParameter('previousAnswer');
            let html = '';

            if (previousAnswer) {
                html += `
                    <div class="notice">
                        Someone already filled this bingo questionnaire. Select your own grid, then press compare to see the result.
                    </div>
                `;
            } else {
                html += '<div class="info">Select the items you want to mark as yes.</div>';
            }

            html += '<form id="questionnaire-form">';
            html += '<div style="display:none">';
            questionsSet.questions.forEach((q, index) => {
                html += `<input type="hidden" name="question_${index}" id="q_${index}" value="No">`;
            });
            html += '</div>';

            html += '<div class="bingo-grid">';
            questionsSet.questions.forEach((q, index) => {
                html += `
                    <button type="button" class="bingo-cell-btn" id="cell_${index}" data-index="${index}" aria-pressed="false">
                        <span class="cell-index">${String(index + 1).padStart(2, '0')}</span>
                        <span class="cell-label">${q.question}</span>
                        <span class="cell-state">No</span>
                    </button>
                `;
            });
            html += '</div>';

            html += '<div class="form-actions">';
            if (!previousAnswer) {
                html += '<button type="submit" class="submit-btn">Generate result link</button>';
                html += '<div class="action-hint">Your current 3×3 grid will be turned into a shareable result URL.</div>';
            } else {
                html += '<button type="button" class="submit-btn" id="compare-btn">Compare answers</button>';
                html += '<div class="action-hint">Your selected grid will be compared with the saved result on the next page.</div>';
            }
            html += '</div>';
            html += '</form>';

            contentDiv.innerHTML = html;

            questionsSet.questions.forEach((q, index) => {
                const btn = document.getElementById(`cell_${index}`);
                const input = document.getElementById(`q_${index}`);
                const state = btn.querySelector('.cell-state');

                btn.addEventListener('click', function() {
                    const isActive = input.value === 'Yes';
                    input.value = isActive ? 'No' : 'Yes';
                    const selected = input.value === 'Yes';
                    btn.classList.toggle('clicked', selected);
                    btn.setAttribute('aria-pressed', String(selected));
                    state.textContent = selected ? 'Yes' : 'No';
                });
            });

            document.getElementById('questionnaire-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const resultNumber = buildAnswerNumber(questionsSet, this);
                const currentUrl = new URL(window.location.href);
                currentUrl.searchParams.set('previousAnswer', resultNumber);
                showModal(currentUrl.toString());
            });

            const compareBtn = document.getElementById('compare-btn');
            if (compareBtn) {
                compareBtn.addEventListener('click', function() {
                    const myAnswer = buildAnswerNumber(questionsSet, document.getElementById('questionnaire-form'));
                    const compareUrl = new URL('compare.html', window.location.href);
                    compareUrl.searchParams.set('questionSet', questionSetParam);
                    compareUrl.searchParams.set('previousAnswer', previousAnswer);
                    compareUrl.searchParams.set('myAnswer', myAnswer);
                    window.location.href = compareUrl.toString();
                });
            }
        }

        function showModal(url) {
            document.getElementById('resultUrl').value = url;
            document.getElementById('resultModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('show');
            const copyBtn = document.querySelector('.copy-btn');
            copyBtn.classList.remove('copied');
            copyBtn.textContent = 'Copy link';
        }

        function copyToClipboard() {
            const urlInput = document.getElementById('resultUrl');

            navigator.clipboard.writeText(urlInput.value).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                copyBtn.classList.add('copied');
                copyBtn.textContent = 'Copied';

                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.textContent = 'Copy link';
                }, 2000);
            }).catch(() => {
                urlInput.select();
                document.execCommand('copy');
            });
        }

        window.addEventListener('click', function(event) {
            if (event.target.id === 'resultModal') {
                closeModal();
            }
        });

        window.addEventListener('DOMContentLoaded', function() {
            applyTheme(getThemePreference());
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            runTests();
            renderBingo();
        });
    </script>
</body>
</html>
