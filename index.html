<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionnaire</title>
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('theme');
                const theme = savedTheme === 'dark' || savedTheme === 'light'
                    ? savedTheme
                    : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.classList.toggle('dark', theme === 'dark');
            } catch (error) {
                document.documentElement.classList.toggle('dark', window.matchMedia('(prefers-color-scheme: dark)').matches);
            }
        }());
    </script>
    <style>
        :root {
            color-scheme: light;
            --bg: #fcfcfb;
            --surface: #ffffff;
            --text: #171717;
            --muted: #6b6b6b;
            --line: #e6e6e2;
            --line-strong: #d4d4cf;
            --soft: #f5f5f2;
            --overlay: rgba(12, 12, 12, 0.38);
        }

        html.dark {
            color-scheme: dark;
            --bg: #111111;
            --surface: #161616;
            --text: #f5f5f3;
            --muted: #afafaa;
            --line: #2b2b2b;
            --line-strong: #3b3b3b;
            --soft: #1a1a1a;
            --overlay: rgba(0, 0, 0, 0.62);
        }

        html {
            background: var(--bg);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Helvetica Neue", Arial, sans-serif;
            transition: background 0.2s ease, color 0.2s ease;
        }

        button,
        input {
            font: inherit;
        }

        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 28px 24px 88px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 52px;
        }

        .topbar.inside {
            display: grid;
            grid-template-columns: 36px 1fr auto;
        }

        .brand {
            font-size: 0.95rem;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        .topbar.inside .brand {
            text-align: center;
        }

        .theme-toggle {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            border-radius: 999px;
            padding: 10px 16px;
            cursor: pointer;
        }

        .back-link {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 999px;
            color: var(--muted);
            text-decoration: none;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .topbar.inside .back-link {
            display: inline-flex;
        }

        .back-link:hover {
            background: var(--soft);
            color: var(--text);
        }

        .back-link svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        .page-title {
            font-size: clamp(3rem, 7vw, 4.6rem);
            line-height: 0.98;
            letter-spacing: -0.05em;
            margin-bottom: 24px;
        }

        .lead,
        .info,
        .selection-title {
            font-size: 1.08rem;
            line-height: 1.75;
            color: var(--muted);
            max-width: 780px;
        }

        .lead + .lead {
            margin-top: 18px;
        }

        .info {
            margin-bottom: 24px;
        }

        .selection-title {
            margin-bottom: 24px;
        }

        .selection-container {
            display: grid;
            gap: 22px;
        }

        .questionnaire-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 24px;
            background: var(--surface);
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .questionnaire-card:hover {
            border-color: var(--line-strong);
            transform: translateY(-1px);
        }

        .questionnaire-card h2 {
            font-size: 1.6rem;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .questionnaire-card p {
            color: var(--muted);
            line-height: 1.6;
        }

        .error,
        .notice {
            margin-bottom: 24px;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: var(--soft);
            color: var(--text);
            line-height: 1.65;
        }

        .error {
            border-color: #d68d8d;
        }

        .question-container {
            margin-top: 46px;
            padding-top: 12px;
            border-top: 1px solid var(--line);
        }

        .question-title {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 20px;
        }

        .question-title-text {
            font-size: clamp(1.7rem, 4vw, 2.25rem);
            line-height: 1.18;
            letter-spacing: -0.04em;
            font-weight: 700;
        }

        .unselect-btn {
            border: 1px solid var(--line);
            background: transparent;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
        }

        .options-container {
            display: grid;
            gap: 14px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.65;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1.5px solid var(--line-strong);
            background: transparent;
            flex-shrink: 0;
            margin: 0;
            transition: border-width 0.15s ease, border-color 0.15s ease;
        }

        .radio-option input[type="radio"]:checked {
            border-width: 6px;
            border-color: var(--text);
        }

        .radio-option label {
            cursor: pointer;
            flex: 1;
        }

        .form-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 42px;
            padding-top: 28px;
            border-top: 1px solid var(--line);
        }

        .submit-btn,
        .secondary-btn,
        .copy-btn {
            border-radius: 999px;
            padding: 12px 18px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .submit-btn {
            border: none;
            background: var(--text);
            color: var(--bg);
            font-weight: 600;
        }

        .secondary-btn,
        .copy-btn {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
        }

        .submit-btn:hover,
        .secondary-btn:hover,
        .copy-btn:hover,
        .theme-toggle:hover,
        .unselect-btn:hover {
            opacity: 0.85;
        }

        .action-hint {
            color: var(--muted);
            line-height: 1.6;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 1000;
            padding: 24px;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            width: min(720px, 100%);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .modal-header h2 {
            font-size: 1.7rem;
            letter-spacing: -0.03em;
        }

        .close-btn {
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
        }

        .url-container {
            display: grid;
            gap: 12px;
        }

        .url-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: var(--soft);
            color: var(--text);
        }

        .copy-btn.copied {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        @media (max-width: 720px) {
            .page {
                padding: 20px 18px 72px;
            }

            .topbar,
            .question-title,
            .form-actions,
            .modal-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .topbar.inside {
                display: grid;
                grid-template-columns: 36px 1fr auto;
                align-items: center;
            }

            .question-title-text {
                font-size: clamp(1.7rem, 4vw, 2.25rem);
            }
        }

    </style>
</head>
<body>
    <div class="page">
        <div class="topbar" id="topbar">
            <a href="index.html" class="back-link" id="backLink" aria-label="Back to questionnaires" title="Back to questionnaires">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M15 18L9 12L15 6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </a>
            <div class="brand">Questionnaire</div>
            <button id="themeToggle" class="theme-toggle" type="button">Light / Dark</button>
        </div>

        <h1 class="page-title">Questionnaire</h1>
        <div id="content"></div>
    </div>

    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Your answer link</h2>
                <button class="close-btn" type="button" onclick="closeModal()">&times;</button>
            </div>
            <div class="url-container">
                <input type="text" id="resultUrl" class="url-input" readonly>
                <button class="copy-btn" type="button" onclick="copyToClipboard()">Copy link</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="logic.js"></script>
    <script>
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function getThemePreference() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || savedTheme === 'light') {
                return savedTheme;
            }

            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            document.documentElement.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
        }

        function renderSelection() {
            const contentDiv = document.getElementById('content');
            const availableSets = Object.keys(questionBank);

            let html = '<div class="selection-title">Choose a questionnaire to begin.</div>';
            html += '<div class="selection-container">';

            availableSets.forEach(setKey => {
                const questions = questionBank[setKey];
                const href = setKey === 'bingo' ? `bingo.html?questions=${setKey}` : `?questions=${setKey}`;
                html += `
                    <div class="questionnaire-card" onclick="window.location.href='${href}'">
                        <h2>${setKey}</h2>
                        <p>${questions.questions.length} questions</p>
                    </div>
                `;
            });

            html += '</div>';
            contentDiv.innerHTML = html;
        }

        function renderQuestionnaire() {
            const contentDiv = document.getElementById('content');
            const questionSetUrlParam = getURLParameter('questions');

            if (!questionSetUrlParam) {
                renderSelection();
                return;
            }

            const questionsSet = questionBank[questionSetUrlParam];

            if (!questionsSet) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Question set "${questionSetUrlParam}" not found. Available sets: ${Object.keys(questionBank).join(', ')}
                    </div>
                `;
                return;
            }

            let html = `<div class="info">Questionnaire: <strong>${questionSetUrlParam}</strong> (${questionsSet.questions.length} questions)</div>`;

            const previousAnswer = getURLParameter('previousAnswer');
            if (previousAnswer) {
                html += `
                    <div class="notice">
                        Someone already filled this questionnaire. Add your own answers below, then press compare to see the result.
                    </div>
                `;
            }

            html += '<form id="questionnaire-form">';

            questionsSet.questions.forEach((q, index) => {
                html += `
                    <section class="question-container">
                        <div class="question-title">
                            <span class="question-title-text">${index + 1}. ${q.question}</span>
                            <button type="button" class="unselect-btn" onclick="clearAnswer(${index})">Clear</button>
                        </div>
                        <div class="options-container">
                `;

                q.options.forEach((option, optIndex) => {
                    const radioId = `q${index}_opt${optIndex}`;
                    html += `
                        <div class="radio-option" onclick="document.getElementById('${radioId}').click()">
                            <input type="radio" id="${radioId}" name="question_${index}" value="${option}">
                            <label for="${radioId}">${option}</label>
                        </div>
                    `;
                });

                html += '</div></section>';
            });

            html += '<div class="form-actions">';
            if (!previousAnswer) {
                html += '<button type="submit" class="submit-btn">Generate result link</button>';
                html += '<div class="action-hint">Your selected answers will be encoded into a shareable URL.</div>';
            } else {
                html += '<button type="button" class="submit-btn" id="compare-btn">Compare answers</button>';
                html += '<div class="action-hint">Your answers will be compared with the saved result on the next page.</div>';
            }
            html += '</div>';
            html += '</form>';

            contentDiv.innerHTML = html;

            document.getElementById('questionnaire-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const resultNumber = collectAnswerNumber(questionsSet, this);

                const currentUrl = new URL(window.location.href);
                currentUrl.searchParams.set('previousAnswer', resultNumber);
                showModal(currentUrl.toString());
            });

            const compareBtn = document.getElementById('compare-btn');
            if (compareBtn) {
                compareBtn.addEventListener('click', function() {
                    const myAnswer = collectAnswerNumber(questionsSet, document.getElementById('questionnaire-form'));
                    const compareUrl = new URL('compare.html', window.location.href);
                    compareUrl.searchParams.set('questionSet', questionSetUrlParam);
                    compareUrl.searchParams.set('previousAnswer', getURLParameter('previousAnswer'));
                    compareUrl.searchParams.set('myAnswer', myAnswer);
                    window.location.href = compareUrl.toString();
                });
            }
        }

        function collectAnswerNumber(questionsSet, formElement) {
            const formData = new FormData(formElement);
            const answerArray = [];

            questionsSet.questions.forEach((q, index) => {
                const answerValue = formData.get(`question_${index}`);
                if (answerValue) {
                    answerArray.push(q.options.findIndex(option => option === answerValue) + 1);
                } else {
                    answerArray.push(0);
                }
            });

            return handleAnswers(questionsSet, answerArray);
        }

        function clearAnswer(index) {
            document.querySelectorAll(`input[name="question_${index}"]`).forEach(radio => {
                radio.checked = false;
            });
        }

        function showModal(url) {
            document.getElementById('resultUrl').value = url;
            document.getElementById('resultModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('show');
            const copyBtn = document.querySelector('.copy-btn');
            copyBtn.classList.remove('copied');
            copyBtn.textContent = 'Copy link';
        }

        function copyToClipboard() {
            const urlInput = document.getElementById('resultUrl');

            navigator.clipboard.writeText(urlInput.value).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                copyBtn.classList.add('copied');
                copyBtn.textContent = 'Copied';

                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.textContent = 'Copy link';
                }, 2000);
            }).catch(() => {
                urlInput.select();
                document.execCommand('copy');
            });
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('resultModal');
            if (event.target === modal) {
                closeModal();
            }
        });

        window.addEventListener('DOMContentLoaded', function() {
            applyTheme(getThemePreference());
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('topbar').classList.toggle('inside', Boolean(getURLParameter('questions')));
            runTests();
            renderQuestionnaire();
        });
    </script>
</body>
</html>
