<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionnaire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .question-container {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px solid #e9ecef;
        }

        .question-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .question-title-text {
            flex: 1;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 2px solid #dee2e6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .radio-option input[type="radio"] {
            margin-right: 12px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .radio-option label {
            cursor: pointer;
            flex: 1;
            color: #333;
            font-size: 1em;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .skip-btn {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 30px;
            font-size: 0.9em;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .skip-btn:hover {
            background: #667eea;
            color: white;
        }

        .unselect-btn {
            background: transparent;
            color: #6c757d;
            border: 1px solid #6c757d;
            padding: 6px 16px;
            font-size: 0.8em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .unselect-btn:hover {
            background: #6c757d;
            color: white;
        }

        .info {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .selection-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .questionnaire-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .questionnaire-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .questionnaire-card h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .questionnaire-card p {
            font-size: 0.9em;
            opacity: 0.9;
            margin: 0;
        }

        .selection-title {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #f0f0f0;
        }

        .url-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .url-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.9em;
            font-family: monospace;
        }

        .copy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .copy-btn.copied {
            background: #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Questionnaire</h1>
        <div id="content"></div>
    </div>

    <!-- Modal for showing the result URL -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Your Answer URL</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="url-container">
                <input type="text" id="resultUrl" class="url-input" readonly>
                <button class="copy-btn" onclick="copyToClipboard()">Copy URL</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="logic.js"></script>
    <script>
        // Get the questions parameter from URL
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Render the questionnaire selection screen
        function renderSelection() {
            const contentDiv = document.getElementById('content');
            const availableSets = Object.keys(questionBank);
            
            let html = '<div class="selection-title">Please choose a questionnaire:</div>';
            html += '<div class="selection-container">';
            
            availableSets.forEach(setKey => {
                const questions = questionBank[setKey];
                html += `
                    <div class="questionnaire-card" onclick="window.location.href='?questions=${setKey}'">
                        <h2>${setKey}</h2>
                        <p>${questions.questions.length} questions</p>
                    </div>
                `;
            });
            
            html += '</div>';
            contentDiv.innerHTML = html;
        }

        // Render the questionnaire
        function renderQuestionnaire() {
            const contentDiv = document.getElementById('content');
            const questionSetUrlParam = getURLParameter('questions');

            if (!questionSetUrlParam) {
                renderSelection();
                return;
            }

            const questionsSet = questionBank[questionSetUrlParam];

            if (!questionsSet) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Question set "${questionSetUrlParam}" not found. Available sets: ${Object.keys(questionBank).join(', ')}
                    </div>
                `;
                return;
            }

            let html = `<div class="info">Questionnaire: <strong>${questionSetUrlParam}</strong> (${questionsSet.questions.length} questions)</div>`;
            
            // Show info message if previousAnswer parameter exists
            const previousAnswer = getURLParameter('previousAnswer');
            if (previousAnswer) {
                html += '<div class="info" style="background: #e7f3ff; border-left: 4px solid #007bff; padding: 12px; border-radius: 8px; margin-bottom: 20px; color: #004085;">Some user already filled this questionnaire, press compare to see the results.</div>';
            }
            
            html += '<form id="questionnaire-form">';

            questionsSet.questions.forEach((q, index) => {
                html += `
                    <div class="question-container">
                        <div class="question-title">
                            <span class="question-title-text">${index + 1}. ${q.question}</span>
                            <button type="button" class="unselect-btn" onclick="document.querySelectorAll('input[name=\\'question_${index}\\']').forEach(radio => radio.checked = false)">Unselect</button>
                        </div>
                        <div class="options-container">
                `;

                q.options.forEach((option, optIndex) => {
                    const radioId = `q${index}_opt${optIndex}`;
                    html += `
                        <div class="radio-option" onclick="document.getElementById('${radioId}').click()">
                            <input type="radio" id="${radioId}" name="question_${index}" value="${option}">
                            <label for="${radioId}">${option}</label>
                        </div>
                    `;
                });

                html += '</div></div>';
            });

            // Show submit button only if previousAnswer is not set
            if (!previousAnswer) {
                html += '<button type="submit" class="submit-btn">Submit Answers</button>';
            } else {
                // Show compare button if previousAnswer parameter exists
                html += '<button type="button" class="submit-btn" id="compare-btn" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">Compare Answers</button>';
            }
            
            html += '</form>';

            contentDiv.innerHTML = html;

            // Add form submission handler
            document.getElementById('questionnaire-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                const answerArray = [];
                
                questionsSet.questions.forEach((q, index) => {
                    const answerValue = formData.get(`question_${index}`);
                    
                    if (answerValue) {
                        // Find the index of the selected answer in the options array (0-based)
                        const optionIndex = q.options.findIndex(option => option === answerValue);
                        // Convert to 1-based index
                        answerArray.push(optionIndex + 1);
                    } else {
                        // Skipped question - use 0 to indicate no answer
                        answerArray.push(0);
                    }
                });

                // Call handleAnswers with the question set and answers
                const resultNumber = handleAnswers(questionsSet, answerArray);
                
                // Generate URL with the result
                const currentUrl = new URL(window.location.href);
                currentUrl.searchParams.set('previousAnswer', resultNumber);
                const resultUrl = currentUrl.toString();
                
                // Show modal with the URL
                showModal(resultUrl);
            });
            
            // Add compare button handler if it exists
            const compareBtn = document.getElementById('compare-btn');
            if (compareBtn) {
                compareBtn.addEventListener('click', function() {
                    const formData = new FormData(document.getElementById('questionnaire-form'));
                    const answerArray = [];
                    
                    questionsSet.questions.forEach((q, index) => {
                        const answerValue = formData.get(`question_${index}`);
                        
                        if (answerValue) {
                            const optionIndex = q.options.findIndex(option => option === answerValue);
                            answerArray.push(optionIndex + 1);
                        } else {
                            answerArray.push(0);
                        }
                    });
                    
                    const myAnswer = handleAnswers(questionsSet, answerArray);
                    const previousAnswer = getURLParameter('previousAnswer');
                    
                    // Redirect to compare.html with parameters
                    const compareUrl = new URL('compare.html', window.location.href);
                    compareUrl.searchParams.set('questionSet', questionSetUrlParam);
                    compareUrl.searchParams.set('previousAnswer', previousAnswer);
                    compareUrl.searchParams.set('myAnswer', myAnswer);
                    
                    window.location.href = compareUrl.toString();
                });
            }
        }

        function showModal(url) {
            const modal = document.getElementById('resultModal');
            const urlInput = document.getElementById('resultUrl');
            urlInput.value = url;
            modal.classList.add('show');
        }

        function closeModal() {
            const modal = document.getElementById('resultModal');
            modal.classList.remove('show');
            const copyBtn = document.querySelector('.copy-btn');
            copyBtn.classList.remove('copied');
            copyBtn.textContent = 'Copy URL';
        }

        function copyToClipboard() {
            const urlInput = document.getElementById('resultUrl');
            urlInput.select();
            urlInput.setSelectionRange(0, 99999); // For mobile devices
            
            try {
                document.execCommand('copy');
                const copyBtn = document.querySelector('.copy-btn');
                copyBtn.classList.add('copied');
                copyBtn.textContent = 'Copied!';
                
                // Reset button text after 2 seconds
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.textContent = 'Copy URL';
                }, 2000);
            } catch (err) {
                // Fallback for browsers that don't support execCommand
                navigator.clipboard.writeText(urlInput.value).then(() => {
                    const copyBtn = document.querySelector('.copy-btn');
                    copyBtn.classList.add('copied');
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => {
                        copyBtn.classList.remove('copied');
                        copyBtn.textContent = 'Copy URL';
                    }, 2000);
                });
            }
        }

        // Close modal when clicking outside of it
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('resultModal');
            if (event.target === modal) {
                closeModal();
            }
        });
        

        // Initialize when page loads
        window.addEventListener('DOMContentLoaded', function() {
            runTests();
            renderQuestionnaire();
        });
    </script>
</body>
</html>
